<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Jackie · Network CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ============ CONFIG ============ */
  /* PASTE your Apps Script Web App /exec URL between the quotes below, then commit. */
  /* ============ TOKENS ============ */
  :root{
    --bg:#f6f3ec; --surface:#ffffff; --surface-2:#faf8f3; --line:#e7e1d5;
    --ink:#1c2024; --ink-2:#5b6068; --ink-3:#8b9099;
    --accent:#1f4b43; --accent-2:#2f6b5e; --gold:#b0842f;
    --shadow:0 1px 2px rgba(28,32,36,.06),0 8px 24px rgba(28,32,36,.06);
    --shadow-lg:0 12px 40px rgba(28,32,36,.18);
    --r:14px; --r-sm:9px;
    --st-notstarted:#8b9099; --st-reached:#3b6fb0; --st-await:#b0842f;
    --st-meeting:#2f6b7c; --st-met:#2f7d4f; --st-followup:#c2662b;
    --st-nurture:#7a5aa8; --st-closed:#a0555f;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#14171a; --surface:#1c2024; --surface-2:#22262b; --line:#31363d;
      --ink:#eef0f2; --ink-2:#a8aeb6; --ink-3:#767c85;
      --accent:#5fb3a1; --accent-2:#4a9d8b; --gold:#d0a355;
      --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.28);
      --shadow-lg:0 12px 40px rgba(0,0,0,.5);
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;font-size:14px;line-height:1.45}
  button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
  button{cursor:pointer;border:none;background:none}
  ::placeholder{color:var(--ink-3)}

  /* ============ GATE ============ */
  #gate{position:fixed;inset:0;display:grid;place-items:center;background:var(--bg);z-index:100;padding:20px}
  #gate .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
    box-shadow:var(--shadow-lg);padding:38px 34px;width:100%;max-width:380px;text-align:center}
  #gate .mark{font-family:Fraunces,serif;font-weight:600;font-size:15px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--gold)}
  #gate h1{font-family:Fraunces,serif;font-weight:500;font-size:28px;margin:12px 0 4px;letter-spacing:-.01em}
  #gate p{color:var(--ink-2);margin:0 0 22px}
  #gate input{width:100%;padding:13px 15px;border:1px solid var(--line);border-radius:var(--r-sm);
    background:var(--surface-2);text-align:center;letter-spacing:.06em;margin-bottom:12px}
  #gate input:focus{outline:none;border-color:var(--accent)}
  #gate button{width:100%;padding:13px;border-radius:var(--r-sm);background:var(--accent);
    color:#fff;font-weight:600;letter-spacing:.02em}
  #gate button:hover{background:var(--accent-2)}
  #gate .err{color:var(--st-closed);min-height:18px;font-size:13px;margin-top:8px}

  /* ============ SHELL ============ */
  #app{display:none;min-height:100vh}
  header.top{position:sticky;top:0;z-index:40;background:color-mix(in srgb,var(--bg) 88%,transparent);
    backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .top-in{max-width:1320px;margin:0 auto;padding:14px 22px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .brand{display:flex;flex-direction:column;line-height:1.1;margin-right:auto}
  .brand .k{font-family:Fraunces,serif;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold)}
  .brand .t{font-family:Fraunces,serif;font-weight:500;font-size:21px;letter-spacing:-.01em}
  .search{position:relative}
  .search input{width:280px;max-width:46vw;padding:9px 12px 9px 34px;border:1px solid var(--line);
    border-radius:999px;background:var(--surface)}
  .search input:focus{outline:none;border-color:var(--accent)}
  .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink-3)}
  .btn{padding:9px 15px;border-radius:var(--r-sm);border:1px solid var(--line);background:var(--surface);
    font-weight:600;color:var(--ink);display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
  .btn:hover{border-color:var(--ink-3)}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn.primary:hover{background:var(--accent-2)}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:var(--r-sm);overflow:hidden;background:var(--surface)}
  .seg button{padding:8px 14px;font-weight:600;color:var(--ink-2)}
  .seg button.on{background:var(--accent);color:#fff}

  main{max-width:1320px;margin:0 auto;padding:20px 22px 80px}

  /* tabs */
  .tabs{display:flex;gap:4px;margin-bottom:16px}
  .tabs button{padding:8px 4px;font-family:Fraunces,serif;font-size:17px;color:var(--ink-3);
    border-bottom:2px solid transparent;margin-right:20px}
  .tabs button.on{color:var(--ink);border-color:var(--gold)}

  /* stats */
  .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px}
  .stat .n{font-family:Fraunces,serif;font-size:26px;font-weight:600;line-height:1}
  .stat .l{color:var(--ink-2);font-size:12px;margin-top:5px;letter-spacing:.02em}
  .stat .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:1px}

  /* filter chips */
  .filters{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px;align-items:center}
  .filters .lbl{font-size:12px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.08em;margin-right:2px}
  .chip{padding:6px 12px;border-radius:999px;border:1px solid var(--line);background:var(--surface);
    font-weight:500;font-size:13px;color:var(--ink-2)}
  .chip.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}
  .chip .cd{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:1px}
  .sep{width:1px;height:22px;background:var(--line);margin:0 4px}

  /* table */
  .tablewrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
  table{width:100%;border-collapse:collapse}
  thead th{text-align:left;font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-3);
    font-weight:600;padding:12px 14px;border-bottom:1px solid var(--line);background:var(--surface-2);cursor:pointer;white-space:nowrap;user-select:none}
  thead th.no{cursor:default}
  thead th .ar{opacity:.5;font-size:10px}
  tbody td{padding:12px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:var(--surface-2)}
  .name{font-weight:600;cursor:pointer}
  .name:hover{color:var(--accent)}
  .sub{color:var(--ink-3);font-size:12px;margin-top:2px}
  .muted{color:var(--ink-3)}
  td.nowrap{white-space:nowrap}

  /* pills */
  .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:12px;
    font-weight:600;border:1px solid transparent;white-space:nowrap}
  .pill .cd{width:7px;height:7px;border-radius:50%}
  select.statuscell{border:1px solid var(--line);border-radius:999px;padding:5px 9px;background:var(--surface);
    font-weight:600;font-size:12px;cursor:pointer;max-width:170px}
  select.statuscell:focus{outline:none;border-color:var(--accent)}
  .owner{padding:3px 9px;border-radius:6px;background:var(--surface-2);border:1px solid var(--line);
    font-size:12px;font-weight:600;color:var(--ink-2)}

  /* kanban */
  .kanban{display:flex;gap:14px;overflow-x:auto;padding-bottom:10px}
  .kcol{flex:0 0 268px;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r);
    display:flex;flex-direction:column;max-height:calc(100vh - 260px)}
  .kcol.drag{outline:2px dashed var(--accent);outline-offset:-4px}
  .kcol h3{margin:0;padding:13px 14px 10px;font-size:12px;letter-spacing:.05em;text-transform:uppercase;
    display:flex;align-items:center;gap:7px;font-weight:700;color:var(--ink-2)}
  .kcol h3 .c{margin-left:auto;background:var(--surface);border:1px solid var(--line);border-radius:999px;
    padding:1px 8px;font-size:11px;color:var(--ink-2)}
  .kbody{padding:0 10px 12px;overflow-y:auto;display:flex;flex-direction:column;gap:9px}
  .kcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);padding:11px 12px;
    box-shadow:var(--shadow);cursor:grab}
  .kcard:active{cursor:grabbing}
  .kcard .kn{font-weight:600}
  .kcard .kmeta{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px;align-items:center}
  .kcard .kns{color:var(--ink-2);font-size:12px;margin-top:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

  .empty{padding:60px 20px;text-align:center;color:var(--ink-3)}
  .empty .big{font-family:Fraunces,serif;font-size:20px;color:var(--ink-2);margin-bottom:6px}

  /* drawer */
  .scrim{position:fixed;inset:0;background:rgba(20,23,26,.4);z-index:60;opacity:0;pointer-events:none;transition:opacity .2s}
  .scrim.on{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100vh;width:460px;max-width:92vw;background:var(--surface);
    border-left:1px solid var(--line);box-shadow:var(--shadow-lg);z-index:70;transform:translateX(100%);
    transition:transform .24s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
  .drawer.on{transform:none}
  .dhead{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
  .dhead .dt{font-family:Fraunces,serif;font-size:20px;font-weight:500;margin-right:auto}
  .dhead .x{width:34px;height:34px;border-radius:8px;display:grid;place-items:center;color:var(--ink-2)}
  .dhead .x:hover{background:var(--surface-2)}
  .dbody{padding:18px 22px;overflow-y:auto;flex:1}
  .field{margin-bottom:15px}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--ink-2);margin-bottom:6px;letter-spacing:.02em}
  .field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--line);
    border-radius:var(--r-sm);background:var(--surface-2)}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);background:var(--surface)}
  .field textarea{resize:vertical;min-height:64px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .dfoot{padding:15px 22px;border-top:1px solid var(--line);display:flex;gap:10px;align-items:center}
  .dfoot .del{color:var(--st-closed);margin-right:auto;font-weight:600;padding:9px 4px}
  .dfoot .del:hover{text-decoration:underline}

  /* toast */
  #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);z-index:90;
    background:var(--ink);color:var(--bg);padding:11px 18px;border-radius:999px;font-weight:600;font-size:13px;
    box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:.25s}
  #toast.on{opacity:1;transform:translateX(-50%)}
  #toast.err{background:var(--st-closed);color:#fff}

  .spin{width:18px;height:18px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;
    animation:sp .7s linear infinite;display:inline-block}
  @keyframes sp{to{transform:rotate(360deg)}}
  #loading{padding:70px;text-align:center;color:var(--ink-3)}

  @media (max-width:900px){
    .stats{grid-template-columns:repeat(2,1fr)}
    .search input{width:180px}
    main{padding:16px 14px 80px}
    .top-in{padding:12px 14px;gap:10px}
  }
</style>
</head>
<body>

<!-- ============ GATE ============ -->
<div id="gate">
  <div class="card">
    <div class="mark">Gratia</div>
    <h1>Network CRM</h1>
    <p>Jackie's network · outreach tracker</p>
    <input id="pw" type="password" placeholder="senha" autocomplete="current-password" autofocus>
    <button id="enter">Entrar</button>
    <div class="err" id="gateErr"></div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app">
  <header class="top">
    <div class="top-in">
      <div class="brand"><span class="k">Gratia · Network</span><span class="t">Jackie's Network</span></div>
      <div class="search">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>
        <input id="q" type="search" placeholder="Buscar nome, empresa, nota…">
      </div>
      <div class="seg" id="viewSeg">
        <button data-v="table" class="on">Tabela</button>
        <button data-v="kanban">Kanban</button>
      </div>
      <button class="btn" id="refresh" title="Recarregar"><span id="refreshIco">↻</span></button>
      <button class="btn primary" id="addBtn">＋ Adicionar</button>
    </div>
  </header>

  <main>
    <div class="tabs">
      <button data-tab="people" class="on">People</button>
      <button data-tab="events">Events</button>
    </div>

    <div id="loading"><span class="spin"></span></div>

    <!-- PEOPLE -->
    <section id="peopleTab" style="display:none">
      <div class="stats" id="stats"></div>
      <div class="filters" id="filters"></div>
      <div id="peopleContent"></div>
    </section>

    <!-- EVENTS -->
    <section id="eventsTab" style="display:none">
      <div id="eventsContent"></div>
    </section>
  </main>
</div>

<!-- drawer -->
<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer">
  <div class="dhead">
    <span class="dt" id="drawerTitle">Editar</span>
    <button class="x" id="drawerClose">✕</button>
  </div>
  <div class="dbody" id="drawerBody"></div>
  <div class="dfoot" id="drawerFoot">
    <button class="del" id="drawerDelete">Excluir</button>
    <button class="btn" id="drawerCancel">Cancelar</button>
    <button class="btn primary" id="drawerSave">Salvar</button>
  </div>
</aside>

<div id="toast"></div>

<script>
/* ============================================================
   CONFIG — paste your Apps Script Web App /exec URL here:
   ============================================================ */
var API_URL = "PASTE_YOUR_APPS_SCRIPT_EXEC_URL_HERE";

/* ---------- option sets (must match Code.gs domain) ---------- */
var STATUSES = ["Not started","Reached out","Awaiting reply","Meeting scheduled","Met","Follow-up needed","Nurture","Closed / No fit"];
var ST_COLOR = {
  "Not started":"var(--st-notstarted)","Reached out":"var(--st-reached)","Awaiting reply":"var(--st-await)",
  "Meeting scheduled":"var(--st-meeting)","Met":"var(--st-met)","Follow-up needed":"var(--st-followup)",
  "Nurture":"var(--st-nurture)","Closed / No fit":"var(--st-closed)"
};
var OWNERS   = ["Unassigned","Chan","Ahmed","Jackie"];
var SOURCES  = ["Jackie network","Breakfast","Lunch","Dinner","Conference","Event","Referral","Inbound"];
var PRIOS    = ["","High","Medium","Low"];
var WARMTH   = ["","Cold","Warm","Hot"];
var EV_TYPES = ["Breakfast","Lunch","Dinner","Coffee","Conference","Intro","Call"];

/* ---------- state ---------- */
var pw = sessionStorage.getItem("jcrm_pw") || "";
var S = {
  people:[], events:[],
  q:"", fStatus:new Set(), fOwner:new Set(),
  view:"table", tab:"people",
  sortKey:"Name", sortDir:1,
  editing:null, editType:"person"
};

/* ---------- API ---------- */
function api(action, extra){
  var payload = Object.assign({action:action, pw:pw}, extra||{});
  return fetch(API_URL, { method:"POST", body: JSON.stringify(payload), redirect:"follow" })
    .then(function(r){ return r.json(); })
    .then(function(j){ if(!j || j.ok===false) throw new Error(j && j.error || "erro"); return j; });
}

/* ---------- gate ---------- */
var $ = function(s){ return document.querySelector(s); };
function tryEnter(){
  var val = $("#pw").value.trim();
  if(!val){ return; }
  pw = val;
  $("#gateErr").textContent = "";
  $("#enter").textContent = "…";
  api("list").then(function(j){
    sessionStorage.setItem("jcrm_pw", pw);
    S.people = j.people||[]; S.events = j.events||[];
    $("#gate").style.display="none"; $("#app").style.display="block";
    boot();
  }).catch(function(e){
    pw="";
    $("#gateErr").textContent = (String(e.message)==="auth") ? "Senha incorreta." : ("Falhou: "+e.message);
    $("#enter").textContent = "Entrar";
  });
}
$("#enter").onclick = tryEnter;
$("#pw").addEventListener("keydown", function(e){ if(e.key==="Enter") tryEnter(); });
if(pw){ /* auto-try cached */ $("#enter").textContent="…"; api("list").then(function(j){
  S.people=j.people||[]; S.events=j.events||[];
  $("#gate").style.display="none"; $("#app").style.display="block"; boot();
}).catch(function(){ pw=""; sessionStorage.removeItem("jcrm_pw"); $("#enter").textContent="Entrar"; }); }

/* ---------- boot ---------- */
function boot(){
  $("#loading").style.display="none";
  wireChrome();
  renderFilters();
  render();
}
function reload(){
  $("#refreshIco").outerHTML = '<span class="spin" id="refreshIco"></span>';
  api("list").then(function(j){
    S.people=j.people||[]; S.events=j.events||[]; render();
    toast("Atualizado");
  }).catch(function(e){ toast(e.message,true); })
    .finally(function(){ var el=$("#refreshIco"); if(el) el.outerHTML='<span id="refreshIco">↻</span>'; });
}

function wireChrome(){
  $("#q").addEventListener("input", function(e){ S.q=e.target.value.toLowerCase(); if(S.tab==="people") renderPeople(); });
  document.querySelectorAll("#viewSeg button").forEach(function(b){
    b.onclick=function(){ S.view=b.dataset.v; document.querySelectorAll("#viewSeg button").forEach(function(x){x.classList.toggle("on",x===b);}); renderPeople(); };
  });
  document.querySelectorAll(".tabs button").forEach(function(b){
    b.onclick=function(){ S.tab=b.dataset.tab; document.querySelectorAll(".tabs button").forEach(function(x){x.classList.toggle("on",x===b);}); render(); };
  });
  $("#refresh").onclick=reload;
  $("#addBtn").onclick=function(){ S.tab==="events" ? openEvent(null) : openPerson(null); };
  $("#drawerClose").onclick=closeDrawer; $("#drawerCancel").onclick=closeDrawer; $("#scrim").onclick=closeDrawer;
  $("#drawerSave").onclick=saveDrawer; $("#drawerDelete").onclick=deleteCurrent;
  document.addEventListener("keydown",function(e){ if(e.key==="Escape") closeDrawer(); });
}

/* ---------- render root ---------- */
function render(){
  $("#peopleTab").style.display = S.tab==="people" ? "block":"none";
  $("#eventsTab").style.display = S.tab==="events" ? "block":"none";
  $("#addBtn").innerHTML = S.tab==="events" ? "＋ Evento" : "＋ Adicionar";
  if(S.tab==="people"){ renderStats(); renderPeople(); } else { renderEvents(); }
}

/* ---------- filters ---------- */
function renderFilters(){
  var el=$("#filters"); var h='<span class="lbl">Status</span>';
  STATUSES.forEach(function(s){
    h+='<button class="chip st" data-s="'+esc(s)+'"><span class="cd" style="background:'+ST_COLOR[s]+'"></span>'+esc(s)+'</button>';
  });
  h+='<span class="sep"></span><span class="lbl">Owner</span>';
  OWNERS.forEach(function(o){ h+='<button class="chip ow" data-o="'+esc(o)+'">'+esc(o)+'</button>'; });
  el.innerHTML=h;
  el.querySelectorAll(".chip.st").forEach(function(b){ b.onclick=function(){ toggleSet(S.fStatus,b.dataset.s); b.classList.toggle("on"); renderPeople(); }; });
  el.querySelectorAll(".chip.ow").forEach(function(b){ b.onclick=function(){ toggleSet(S.fOwner,b.dataset.o); b.classList.toggle("on"); renderPeople(); }; });
}
function toggleSet(set,v){ set.has(v)?set.delete(v):set.add(v); }

/* ---------- stats ---------- */
function renderStats(){
  var p=S.people;
  var inprog = p.filter(function(x){return ["Reached out","Awaiting reply","Meeting scheduled"].indexOf(x.Status)>=0;}).length;
  var cards=[
    {n:p.length,l:"Total na rede",c:"var(--ink-3)"},
    {n:p.filter(function(x){return !x.Status||x.Status==="Not started";}).length,l:"Não iniciado",c:ST_COLOR["Not started"]},
    {n:inprog,l:"Em andamento",c:ST_COLOR["Reached out"]},
    {n:p.filter(function(x){return x.Status==="Met";}).length,l:"Já reuniu",c:ST_COLOR["Met"]},
    {n:p.filter(function(x){return x.Status==="Follow-up needed";}).length,l:"Follow-up",c:ST_COLOR["Follow-up needed"]}
  ];
  $("#stats").innerHTML=cards.map(function(c){
    return '<div class="stat"><div class="n">'+c.n+'</div><div class="l"><span class="dot" style="background:'+c.c+'"></span>'+c.l+'</div></div>';
  }).join("");
}

/* ---------- people filtering ---------- */
function filtered(){
  var q=S.q;
  return S.people.filter(function(p){
    if(S.fStatus.size && !S.fStatus.has(p.Status||"Not started")) return false;
    if(S.fOwner.size && !S.fOwner.has(p.Owner||"Unassigned")) return false;
    if(q){
      var hay=((p.Name||"")+" "+(p.Company||"")+" "+(p.Role||"")+" "+(p["JC Comments"]||"")+" "+(p.Notes||"")+" "+(p["Next step"]||"")+" "+(p["Where met"]||"")).toLowerCase();
      if(hay.indexOf(q)<0) return false;
    }
    return true;
  });
}
function sortList(list){
  var k=S.sortKey,d=S.sortDir;
  return list.slice().sort(function(a,b){
    var av=(a[k]||"").toString().toLowerCase(), bv=(b[k]||"").toString().toLowerCase();
    if(av<bv) return -1*d; if(av>bv) return 1*d; return 0;
  });
}

function renderPeople(){
  var el=$("#peopleContent");
  var list=sortList(filtered());
  if(!list.length){ el.innerHTML='<div class="tablewrap"><div class="empty"><div class="big">Nada aqui</div>Ajusta os filtros ou adiciona alguém.</div></div>'; return; }
  S.view==="kanban" ? renderKanban(el) : renderTable(el,list);
}

/* ---------- table ---------- */
function th(key,label,cls){
  var ar = S.sortKey===key ? (S.sortDir>0?" ▲":" ▼") : "";
  return '<th class="'+(cls||"")+'" data-k="'+key+'">'+label+'<span class="ar">'+ar+'</span></th>';
}
function renderTable(el,list){
  var h='<div class="tablewrap"><table><thead><tr>'
    + th("Name","Nome") + th("Company","Empresa") + th("Status","Status")
    + th("Owner","Owner") + th("Source","Fonte","")
    + '<th class="no">Próximo passo</th>' + th("Follow-up date","Follow-up","nowrap")
    + th("Last contact","Últ. contato","nowrap")
    + '</tr></thead><tbody>';
  list.forEach(function(p){
    h+='<tr data-id="'+esc(p.id)+'">'
      + '<td><div class="name" data-open="'+esc(p.id)+'">'+esc(p.Name||"—")+'</div>'+(p.Role||p.LinkedIn?'<div class="sub">'+esc(p.Role||"")+'</div>':'')+'</td>'
      + '<td>'+(p.Company?esc(p.Company):'<span class="muted">—</span>')+'</td>'
      + '<td>'+statusSelect(p)+'</td>'
      + '<td><span class="owner">'+esc(p.Owner||"Unassigned")+'</span></td>'
      + '<td class="muted">'+esc(p.Source||"")+'</td>'
      + '<td>'+(p["Next step"]?esc(p["Next step"]):'<span class="muted">—</span>')+'</td>'
      + '<td class="nowrap">'+dateCell(p["Follow-up date"])+'</td>'
      + '<td class="nowrap muted">'+esc(p["Last contact"]||"—")+'</td>'
      + '</tr>';
  });
  h+='</tbody></table></div>';
  el.innerHTML=h;
  el.querySelectorAll("thead th[data-k]").forEach(function(t){
    t.onclick=function(){ var k=t.dataset.k; if(S.sortKey===k) S.sortDir*=-1; else {S.sortKey=k;S.sortDir=1;} renderPeople(); };
  });
  el.querySelectorAll(".name[data-open]").forEach(function(n){ n.onclick=function(){ openPerson(byId(n.dataset.open)); }; });
  wireStatusSelects(el);
}
function statusSelect(p){
  var cur=p.Status||"Not started";
  var opts=STATUSES.slice(); if(opts.indexOf(cur)<0) opts.push(cur);   // keep off-list values, no silent overwrite
  var col=ST_COLOR[cur]||"var(--ink-3)";
  var o=opts.map(function(s){return '<option value="'+esc(s)+'"'+(s===cur?" selected":"")+'>'+esc(s)+'</option>';}).join("");
  return '<select class="statuscell" data-id="'+esc(p.id)+'" style="border-color:'+col+';color:'+col+'">'+o+'</select>';
}
function wireStatusSelects(scope){
  scope.querySelectorAll("select.statuscell").forEach(function(sel){
    sel.onchange=function(){ setField(sel.dataset.id,"Status",sel.value); };
  });
}
function dateCell(v){ if(!v) return '<span class="muted">—</span>'; return esc(v); }

/* ---------- kanban ---------- */
function renderKanban(el){
  var list=filtered();
  var h='<div class="kanban">';
  STATUSES.forEach(function(st){
    var items=sortList(list.filter(function(p){return (p.Status||"Not started")===st;}));
    h+='<div class="kcol" data-st="'+esc(st)+'"><h3><span class="cd" style="width:8px;height:8px;border-radius:50%;background:'+ST_COLOR[st]+';display:inline-block"></span>'+esc(st)+'<span class="c">'+items.length+'</span></h3><div class="kbody">';
    items.forEach(function(p){
      h+='<div class="kcard" draggable="true" data-id="'+esc(p.id)+'">'
        + '<div class="kn" data-open="'+esc(p.id)+'">'+esc(p.Name||"—")+'</div>'
        + '<div class="kmeta"><span class="owner">'+esc(p.Owner||"Unassigned")+'</span>'
        + (p.Company?'<span class="muted" style="font-size:12px">'+esc(p.Company)+'</span>':'')+'</div>'
        + (p["Next step"]?'<div class="kns">'+esc(p["Next step"])+'</div>':'')
        + '</div>';
    });
    h+='</div></div>';
  });
  h+='</div>';
  el.innerHTML=h;
  el.querySelectorAll(".kn[data-open]").forEach(function(n){ n.onclick=function(){ openPerson(byId(n.dataset.open)); }; });
  wireDnD(el);
}
function wireDnD(el){
  var dragId=null;
  el.querySelectorAll(".kcard").forEach(function(c){
    c.addEventListener("dragstart",function(e){ dragId=c.dataset.id; e.dataTransfer.effectAllowed="move"; setTimeout(function(){c.style.opacity=".4";},0); });
    c.addEventListener("dragend",function(){ c.style.opacity=""; });
  });
  el.querySelectorAll(".kcol").forEach(function(col){
    col.addEventListener("dragover",function(e){ e.preventDefault(); col.classList.add("drag"); });
    col.addEventListener("dragleave",function(){ col.classList.remove("drag"); });
    col.addEventListener("drop",function(e){ e.preventDefault(); col.classList.remove("drag");
      if(dragId){ var st=col.dataset.st; var p=byId(dragId); if(p && (p.Status||"Not started")!==st){ setField(dragId,"Status",st); } }
      dragId=null;
    });
  });
}

/* ---------- inline field update ---------- */
function setField(id,key,val){
  var p=byId(id); if(!p) return;
  var prev=p[key]; p[key]=val;
  if(S.tab==="people"){ renderStats(); renderPeople(); }
  api("upsertPerson",{person:Object.assign({},p)}).then(function(j){
    if(j.person) merge(p,j.person);
  }).catch(function(e){ p[key]=prev; renderStats(); renderPeople(); toast(e.message,true); });
}

/* ---------- drawer: person ---------- */
function openPerson(p){
  S.editType="person"; S.editing = p ? Object.assign({},p) : blankPerson();
  $("#drawerTitle").textContent = p ? (p.Name||"Editar") : "Nova pessoa";
  $("#drawerDelete").style.display = p ? "block":"none";
  $("#drawerBody").innerHTML = personForm(S.editing);
  openDrawer();
}
function blankPerson(){ return {Status:"Not started",Owner:"Unassigned",Source:"Jackie network"}; }
function personForm(p){
  return ''
  + f("Name","Nome", inp("Name",p.Name))
  + row(f("Company","Empresa",inp("Company",p.Company)), f("Role","Cargo",inp("Role",p.Role)))
  + row(f("Email","Email",inp("Email",p.Email,"email")), f("LinkedIn","LinkedIn",inp("LinkedIn",p.LinkedIn)))
  + row(f("Status","Status",sel("Status",STATUSES,p.Status||"Not started")), f("Owner","Owner",sel("Owner",OWNERS,p.Owner||"Unassigned")))
  + row(f("Source","Fonte",sel("Source",SOURCES,p.Source||"Jackie network")), f("Priority","Prioridade",sel("Priority",PRIOS,p.Priority||"")))
  + row(f("Warmth","Warmth",sel("Warmth",WARMTH,p.Warmth||"")), f("Where met","Onde conheceu",inp("Where met",p["Where met"])))
  + row(f("Last contact","Últ. contato",inp("Last contact",p["Last contact"],"date")), f("Follow-up date","Follow-up",inp("Follow-up date",p["Follow-up date"],"date")))
  + f("Next step","Próximo passo",inp("Next step",p["Next step"]))
  + f("JC Comments","Comentário Jackie",ta("JC Comments",p["JC Comments"]))
  + f("Notes","Notas",ta("Notes",p.Notes));
}

/* ---------- drawer: event ---------- */
function openEvent(ev){
  S.editType="event"; S.editing = ev ? Object.assign({},ev) : {Owner:"Jackie",Type:"Lunch"};
  $("#drawerTitle").textContent = ev ? (ev.Event||"Editar") : "Novo evento";
  $("#drawerDelete").style.display = ev ? "block":"none";
  $("#drawerBody").innerHTML = eventForm(S.editing);
  openDrawer();
}
function eventForm(e){
  return ''
  + f("Event","Evento",inp("Event",e.Event))
  + row(f("Date","Data",inp("Date",e.Date,"date")), f("Type","Tipo",sel("Type",EV_TYPES,e.Type||"Lunch")))
  + row(f("Location","Local",inp("Location",e.Location)), f("Owner","Owner",sel("Owner",OWNERS,e.Owner||"Jackie")))
  + f("People met","Pessoas (nomes, separados por vírgula)",ta("People met",e["People met"]))
  + f("Follow-ups pending","Follow-ups pendentes",ta("Follow-ups pending",e["Follow-ups pending"]))
  + f("Notes","Notas",ta("Notes",e.Notes));
}

/* form helpers */
function f(key,label,control){ return '<div class="field"><label>'+esc(label)+'</label>'+control+'</div>'; }
function row(a,b){ return '<div class="grid2">'+a+b+'</div>'; }
function inp(key,val,type){ return '<input data-k="'+esc(key)+'" type="'+(type||"text")+'" value="'+esc(val||"")+'">'; }
function ta(key,val){ return '<textarea data-k="'+esc(key)+'">'+esc(val||"")+'</textarea>'; }
function sel(key,opts,cur){
  var list=opts.slice(); if(cur && list.indexOf(cur)<0) list.push(cur);  // preserve off-list value on save
  return '<select data-k="'+esc(key)+'">'+list.map(function(o){
    return '<option value="'+esc(o)+'"'+(o===cur?" selected":"")+'>'+(o===""?"—":esc(o))+'</option>';
  }).join("")+'</select>';
}

function collectForm(){
  var obj=Object.assign({},S.editing);
  $("#drawerBody").querySelectorAll("[data-k]").forEach(function(el){ obj[el.dataset.k]=el.value; });
  return obj;
}
function saveDrawer(){
  var btn=$("#drawerSave");
  if(btn.disabled) return;                       // guard double-submit -> no dup rows
  var obj=collectForm();
  var isPerson=S.editType==="person";
  if(isPerson && !(obj.Name||"").trim()){ toast("Nome é obrigatório",true); return; }
  if(!isPerson && !(obj.Event||"").trim()){ toast("Nome do evento é obrigatório",true); return; }
  btn.disabled=true; btn.textContent="…";
  var action=isPerson?"upsertPerson":"upsertEvent";
  var key=isPerson?"person":"event";
  var arg={}; arg[key]=obj;
  api(action,arg).then(function(j){
    var saved=isPerson?j.person:j.event;
    var arr=isPerson?S.people:S.events;
    var i=arr.findIndex(function(x){return x.id===saved.id;});
    if(i>=0) arr[i]=saved; else arr.push(saved);
    closeDrawer(); render(); toast("Salvo");
  }).catch(function(e){ toast(e.message,true); }).finally(function(){ btn.disabled=false; btn.textContent="Salvar"; });
}
function deleteCurrent(){
  var obj=S.editing; if(!obj || !obj.id){ closeDrawer(); return; }
  if(!confirm("Excluir "+(obj.Name||obj.Event||"este item")+"?")) return;
  var isPerson=S.editType==="person";
  api(isPerson?"deletePerson":"deleteEvent",{id:obj.id}).then(function(){
    var arr=isPerson?S.people:S.events;
    var i=arr.findIndex(function(x){return x.id===obj.id;}); if(i>=0) arr.splice(i,1);
    closeDrawer(); render(); toast("Excluído");
  }).catch(function(e){ toast(e.message,true); });
}
function openDrawer(){ $("#drawer").classList.add("on"); $("#scrim").classList.add("on"); }
function closeDrawer(){ $("#drawer").classList.remove("on"); $("#scrim").classList.remove("on"); S.editing=null; }

/* ---------- events tab ---------- */
function renderEvents(){
  var el=$("#eventsContent");
  if(!S.events.length){ el.innerHTML='<div class="tablewrap"><div class="empty"><div class="big">Sem eventos ainda</div>Registra um breakfast/lunch e linka as pessoas que conheceu.</div></div>'; return; }
  var list=S.events.slice().sort(function(a,b){ return (b.Date||"").localeCompare(a.Date||""); });
  var h='<div class="tablewrap"><table><thead><tr><th class="no">Evento</th><th class="no nowrap">Data</th><th class="no">Tipo</th><th class="no">Local</th><th class="no">Pessoas</th><th class="no">Owner</th><th class="no">Follow-ups</th></tr></thead><tbody>';
  list.forEach(function(e){
    h+='<tr><td><div class="name" data-ev="'+esc(e.id)+'">'+esc(e.Event||"—")+'</div></td>'
      + '<td class="nowrap muted">'+esc(e.Date||"—")+'</td>'
      + '<td>'+esc(e.Type||"")+'</td>'
      + '<td class="muted">'+esc(e.Location||"—")+'</td>'
      + '<td>'+(e["People met"]?esc(e["People met"]):'<span class="muted">—</span>')+'</td>'
      + '<td><span class="owner">'+esc(e.Owner||"")+'</span></td>'
      + '<td>'+(e["Follow-ups pending"]?esc(e["Follow-ups pending"]):'<span class="muted">—</span>')+'</td></tr>';
  });
  h+='</tbody></table></div>';
  el.innerHTML=h;
  el.querySelectorAll(".name[data-ev]").forEach(function(n){ n.onclick=function(){ openEvent(evById(n.dataset.ev)); }; });
}

/* ---------- utils ---------- */
function byId(id){ return S.people.find(function(p){return p.id===id;}); }
function evById(id){ return S.events.find(function(e){return e.id===id;}); }
function merge(t,s){ for(var k in s) t[k]=s[k]; }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];}); }
var toastT;
function toast(msg,err){ var t=$("#toast"); t.textContent=msg; t.className=err?"on err":"on"; clearTimeout(toastT); toastT=setTimeout(function(){t.className="";},2600); }
</script>
</body>
</html>
